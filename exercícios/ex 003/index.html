<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colocando imagens</title>
</head>
<body><h1>Testando carga e imagens</h1> 
    <p>Confira as logos mais recentes de linguagens de desenvolvimento.</p>

    <img src="logo html5 editada.png" alt="Logo html5">
    <p>Já essa, a da CSS3:</p>
    <img src="imagens/css3.webp" alt="Logo CSS3">
    <p>Também podemos ver abaixo o escudo do clube mais querido do Nordeste:</p>
    <img src="santa cruz2.png" alt="Escudo do Santa Cruz">
</body>
</html>
