<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        table{
            border-collapse: collapse;
             border: 1px solid black;
             padding: 10px;
        }
        th {
          border: 1px solid black;
          background-color: gray;
          color: white;
        }
        td{
            border: 1px solid black;
        }
        .ex{
            font-weight: bold;
        }
        .hm{
            font-weight: bold;
        }
        .media{
            background-color: gray;
            color: white;
        }
    </style>
</head>
<body>
    <table>

        </tr>
            <tr>

    </tr>
    <tr>
        <td>Biologia</td>

    </tr>
    <tr>
        <th colspan="4">Média de Exatas</th>
        <td class="media">0.0</td>
    </tr>
    <tr>
        <td rowspan="2" class="hm">Humanas</td>
        <td>História</td>
        <td>0.0</td>
        <td>0.0</td>
    </tr>
    <tr>
        <td>Geografia</td>
        <td>0.0</td>
        <td>0.0</td>
    </tr>
    <tr>
        <th colspan="4" scope="col">Média de Humanas</th>
        <td class="media">0.0</td>
    </tr>
        

    </table>
</body>
</html>
