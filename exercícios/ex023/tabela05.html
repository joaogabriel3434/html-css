<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela 05</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        th, td{
            border: 1px solid black;
        }
        .azul{
            background-color: blue;
        }
        .vermelho{
            background-color: red;
        }
        .verde{
            background-color: green;
        }
    </style>
</head>
<body>
    <table>
        <colgroup>
        <col class="azul" span="2">
        <col class="vermelho">
        <col class="verde">
        </colgroup>
        <tr>
            <th>Batata</th>
            <th>Laranja</th>
            <th>Banana</th>
            <th>Cereal</th>
        </tr>
        <tr>
            <td>10 gramas</td>
            <td>20 gramas</td>
            <td>30 gramas</td>
            <td>40 gramas</td>
        </tr>
        <tr>
            <td>10 kilos</td>
            <td>20 kilos</td>
            <td>30 kilos</td>
            <td>40 quilos</td>
            <tr>
                <tr>
                <td>10 toneladas</td>
                <td>20 toneladas</td>
                <td>30 toneladas</td>
                <td>40 toneladas</td>
            </tr>
        
    </table>
</body>
</html>
