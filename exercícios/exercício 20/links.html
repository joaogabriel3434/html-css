<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links CSS</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        a{
            color: blue;
            text-decoration: none;
            font-weight: bold;
        }
        a:visited {
            color: blueviolet;
        }
        a:hover {
            text-decoration: underline;
            color:black
        }
        a:active {
            color: rgb(41, 161, 81);
        }
        a::after{
            content: '[link]';
            color: red;
            text-decoration: none;
        }



    </style>
</head>
<body>
    <h1>Personalizando links</h1>
    <li>
        <ul><a href="https://www.youtube.com/cursoemvideo" target="_blank">Canal do Youtube</a></ul>
        <ul><a href="https://gustavoguanabara.github.io" target="_blank">Reporsitório do GitHub</a></ul>
        <ul><a href="https://www.cursoemvideo.com" target="_blank">Site do Curso em Video</a></ul>
    </li>
</body>
</html>
